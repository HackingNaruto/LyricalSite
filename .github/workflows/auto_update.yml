name: 🎵 Auto-Update Song Database

on:
  schedule:
    # Runs daily at 12:00 UTC (5:30 PM IST)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: pip install requests beautifulsoup4

      - name: 🚀 Run Auto-Updater
        run: python auto_updater.py

      - name: 📤 Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db5.json
          if git diff --cached --quiet; then
            echo "✅ No changes to commit — database is already up-to-date."
          else
            git commit -m "Auto-added new songs 🎵"
            git push
            echo "🎉 New songs committed and pushed!"
          fi
